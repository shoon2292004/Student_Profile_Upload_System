<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>
	<h3>User List</h3>
	<p th:text="'Size : '+ ${#lists.size(users_list)}"></p>
	<div th:if="${#lists.size(users_list)}!= 0">


	<ul>
		<li th:each="user :${users_list}" th:if="${user}=='Ag Ag'"
			th:text=${user}></li>
	</ul>
		<h3 th:text="${#lists.isEmpty(users_list)}"></h3>
	</div>



</body>
</html>
